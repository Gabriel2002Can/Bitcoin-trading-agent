services:
  trader:
    build:
      context: .
    env_file:
      - .env
    command: ["python", "-m", "app.run_agent"]

    volumes:
      - logs:/app/logs
      - runtime:/app/runtime

    restart: unless-stopped

  dashboard:
    build:
      context: .

    env_file:
      - .env

    command:
      - streamlit
      - run
      - app/interfaces/streamlit_app.py
      - --server.address=0.0.0.0
      - --server.port=8501

    volumes:
      - logs:/app/logs:ro
      - runtime:/app/runtime

    ports:
      - "8501:8501"

    restart: unless-stopped

volumes:
  logs:
  runtime: